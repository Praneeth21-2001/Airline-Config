server:
  port: 5009

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/booking_db
    username: root
    password: admin

  jpa:
    hibernate:
      ddl-auto: update

  kafka:
    bootstrap-servers: kafka:9092
    consumer:
      group-id: booking-service-group

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
