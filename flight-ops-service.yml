server:
  port: 5005

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/airline_flight_db
    username: root
    password: admin

  jpa:
    hibernate:
      ddl-auto: update

  kafka:
    bootstrap-servers: kafka:9092

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
